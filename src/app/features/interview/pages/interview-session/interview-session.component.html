<section class="interview-session">
  @if (facade.isLoading()) {
    <p>Loading interview...</p>
  } @else {
    <app-conversation-thread [messages]="facade.messages()" />

    @if (facade.error()) {
      <p class="error">{{ facade.error() }}</p>
    }

    <app-answer-box [disabled]="facade.isSubmitting()" (answerSubmit)="onAnswerSubmit($event)" />
  }
</section>
